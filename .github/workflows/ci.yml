name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          cd src/engineering_team
          uv sync

      - name: Verify crew
        run: |
          cd src/engineering_team
          uv run python -c "from engineering_team.crew import EngineeringTeam; print('OK')"
